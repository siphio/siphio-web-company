# Business Profile Schema — validates input to the Siphio pipeline
# Reference: PRD SC-001, SC-002

schema:
  required:
    name:
      type: string
      min_length: 1
      max_length: 100
      description: "Company or product name"

    description:
      type: string
      min_length: 10
      max_length: 500
      description: "Brief description of the business/product"

    features:
      type: array
      min_items: 1
      max_items: 8
      item_schema:
        title:
          type: string
          min_length: 1
          max_length: 80
        description:
          type: string
          min_length: 1
          max_length: 200
      description: "Product features to highlight"

    audience:
      type: string
      min_length: 1
      max_length: 200
      description: "Target audience description"

  optional:
    industry:
      type: string
      enum:
        - fintech
        - saas
        - agency
        - ecommerce
        - education
        - health
        - devtools
        - ai
        - crypto
        - general
      description: "Industry vertical for theme defaults"

    brand_colors:
      type: object
      properties:
        primary:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: "Primary brand color as hex"
        secondary:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: "Secondary brand color as hex"
      required: [primary]

    tone:
      type: string
      enum:
        - professional
        - friendly
        - bold
        - minimal
      default: "professional"
      description: "Communication tone for copy generation"
